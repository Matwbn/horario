<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horario Académico</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #13161d;
    --border: #252a38;
    --muted: #6b7385;
    --cell-h: 64px;
    --col-time: 68px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: #fff;
    font-family: 'Syne', sans-serif;
    display: flex;
    flex-direction: column;
    padding: 14px 14px 18px;
    height: 100vh;
    overflow: hidden;
  }

  header {
    text-align: center;
    margin-bottom: 12px;
    flex-shrink: 0;
  }

  header h1 {
    font-size: 1.35rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #5e8bff, #43e0a0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  header p {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 3px;
    letter-spacing: 0.07em;
    text-transform: uppercase;
  }

  .wrapper {
    flex: 1;
    overflow: auto;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface);
    min-height: 0;
  }

  .grid {
    display: grid;
    grid-template-columns: var(--col-time) repeat(7, 1fr);
    min-width: 700px;
    width: 100%;
  }

  .day-header {
    padding: 12px 4px;
    text-align: center;
    font-size: 0.88rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--surface);
    z-index: 10;
  }
  .day-header:last-child { border-right: none; }

  .time-cell {
    padding: 0 8px 0 0;
    text-align: right;
    font-size: 0.72rem;
    color: var(--muted);
    border-right: 1px solid var(--border);
    border-bottom: 1px solid rgba(255,255,255,0.03);
    display: flex;
    align-items: flex-start;
    padding-top: 5px;
    height: var(--cell-h);
    font-variant-numeric: tabular-nums;
  }

  .grid-cell {
    border-right: 1px solid var(--border);
    border-bottom: 1px solid rgba(255,255,255,0.03);
    height: var(--cell-h);
    position: relative;
  }
  .grid-cell:last-child { border-right: none; }

  .course {
    position: absolute;
    left: 3px;
    right: 3px;
    border-radius: 8px;
    padding: 6px 9px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 2px;
    z-index: 5;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.15);
    cursor: default;
    transition: filter 0.15s;
  }
  .course:hover { filter: brightness(1.15); z-index: 20; }

  .course-name {
    font-weight: 700;
    font-size: 0.9rem;
    color: #ffffff;
    line-height: 1.2;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }

  .course-time {
    font-size: 0.8rem;
    color: rgba(255,255,255,0.9);
    font-weight: 600;
    white-space: nowrap;
  }

  .course-meta {
    font-size: 0.68rem;
    color: rgba(255,255,255,0.65);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .c5 { background: rgba(150,70,220,0.6); }
  .c7 { background: rgba(200,110,20,0.6); }

  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 8px 18px;
    margin-top: 12px;
    justify-content: center;
    flex-shrink: 0;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 0.75rem;
    color: rgba(255,255,255,0.75);
  }

  .legend-dot {
    width: 11px;
    height: 11px;
    border-radius: 3px;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<header>
  <h1>Horario Académico</h1>
  <p>23 Mar – 17 May 2026</p>
</header>

<div class="wrapper">
  <div class="grid" id="schedule-grid"></div>
</div>

<div class="legend" id="legend"></div>

<script>
const DAYS = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];

// Only courses that run 23/03 – 17/05
// METODOLOGÍA CUANTITATIVA: Mar 19:00-21:15, Sáb 19:00-21:15
// IMPL. SOLUCIONES DE RED:   Lun 07:00-10:45, Mié 07:00-10:45

const START_HOUR = 7;
// Latest end is 21:15, so end display at 22:00
const END_HOUR = 22;
const SLOTS_PER_HOUR = 2;
const TOTAL_SLOTS = (END_HOUR - START_HOUR) * SLOTS_PER_HOUR;

function timeToSlot(h, m) {
  return (h - START_HOUR) * SLOTS_PER_HOUR + m / 30;
}
function fmt(h, m) {
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}
function slotLabel(slot) {
  const min = START_HOUR * 60 + slot * 30;
  const h = Math.floor(min / 60), m = min % 60;
  return m === 0 ? fmt(h, 0) : '';
}

const courses = [
  {
    name: 'METODOLOGÍA CUANTITATIVA',
    color: 'c5',
    sessions: [
      { day: 1, startH:19, startM:0, endH:21, endM:15, aula:'Aula Virtual', dates:'23/03–17/05' },
      { day: 5, startH:19, startM:0, endH:21, endM:15, aula:'Aula Virtual', dates:'23/03–17/05' },
    ]
  },
  {
    name: 'IMPL. SOLUCIONES DE RED',
    color: 'c7',
    sessions: [
      { day: 0, startH:7, startM:0, endH:10, endM:45, aula:'Lab 401', dates:'23/03–17/05' },
      { day: 2, startH:7, startM:0, endH:10, endM:45, aula:'Lab 401', dates:'23/03–17/05' },
    ]
  },
];

const grid = document.getElementById('schedule-grid');

const corner = document.createElement('div');
corner.className = 'day-header';
corner.style.cssText = 'position:sticky;top:0;left:0;z-index:20;';
grid.appendChild(corner);

DAYS.forEach(d => {
  const el = document.createElement('div');
  el.className = 'day-header';
  el.textContent = d;
  grid.appendChild(el);
});

for (let s = 0; s < TOTAL_SLOTS; s++) {
  const tc = document.createElement('div');
  tc.className = 'time-cell';
  tc.textContent = slotLabel(s);
  grid.appendChild(tc);
  for (let d = 0; d < 7; d++) {
    const cell = document.createElement('div');
    cell.className = 'grid-cell';
    cell.dataset.slot = s;
    cell.dataset.day = d;
    grid.appendChild(cell);
  }
}

courses.forEach(course => {
  course.sessions.forEach(sess => {
    const startSlot = timeToSlot(sess.startH, sess.startM);
    const spanSlots = timeToSlot(sess.endH, sess.endM) - startSlot;
    const anchor = grid.querySelector(`.grid-cell[data-slot="${startSlot}"][data-day="${sess.day}"]`);
    if (!anchor) return;

    const block = document.createElement('div');
    block.className = `course ${course.color}`;
    block.style.top = '3px';
    block.style.height = `calc(${spanSlots} * var(--cell-h) - 6px)`;
    block.innerHTML = `
      <span class="course-name">${course.name}</span>
      <span class="course-time">${fmt(sess.startH,sess.startM)} – ${fmt(sess.endH,sess.endM)}</span>
      <span class="course-meta">${sess.aula} · ${sess.dates}</span>
    `;
    anchor.appendChild(block);
  });
});

const legend = document.getElementById('legend');
const colorHex = { c5:'#9646dc', c7:'#c86e14' };
courses.forEach(c => {
  const item = document.createElement('div');
  item.className = 'legend-item';
  const dot = document.createElement('div');
  dot.className = 'legend-dot';
  dot.style.background = colorHex[c.color];
  const label = document.createElement('span');
  label.textContent = c.name;
  item.appendChild(dot);
  item.appendChild(label);
  legend.appendChild(item);
});
</script>
</body>
</html>
